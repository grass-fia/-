<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>推しと会話 — 本物AI対応</title>
<style>
:root{--bg:#07121a;--accent:#ff9ac1;--text:#eafaf1;--muted:#bfead0}
body{margin:0;background:linear-gradient(180deg,#021018,#07121a);color:var(--text);font-family:system-ui,-apple-system,"Yu Gothic",sans-serif}
.container{max-width:820px;margin:14px auto;padding:14px}
.header{display:flex;gap:12px;align-items:center}
.avatar{width:72px;height:72px;border-radius:12px;background:linear-gradient(135deg,#154b41,#0b3a36);display:flex;align-items:center;justify-content:center;font-weight:700}
.title{font-size:20px;color:var(--accent)}
.stage{display:flex;gap:14px;margin-top:14px;align-items:flex-start}
#chat{flex:1;background:rgba(255,255,255,0.02);padding:12px;border-radius:12px;height:64vh;overflow:auto;position:relative}
.panel{width:320px;min-width:240px}
.controls{background:rgba(255,255,255,0.02);padding:12px;border-radius:10px}
.msg{margin:10px 0;padding:10px;border-radius:10px;max-width:78%;word-break:break-word}
.me{background:rgba(255,255,255,0.04);margin-left:auto;text-align:right}
.ai{background:linear-gradient(90deg, rgba(255,154,193,0.06), rgba(255,154,193,0.03))}
.inputRow{display:flex;gap:8px;margin-top:10px}
input[type="text"]{flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);background:transparent;color:var(--text)}
button{padding:10px;border-radius:8px;border:none;background:var(--accent);color:#2b1b2b;font-weight:700;cursor:pointer}
.small{font-size:12px;color:var(--muted);margin-top:8px}
/* pulse & particles (keeps the vibe) */
.pulse{animation:beat 1s infinite}@keyframes beat{0%{transform:scale(1)}30%{transform:scale(1.01)}60%{transform:scale(.995)}100%{transform:scale(1)}}
#particles{position:fixed;inset:0;pointer-events:none;z-index:0}
.heart{position:absolute;width:22px;height:20px;opacity:0.9;transform:rotate(-45deg);background:linear-gradient(180deg,#ffb6d6,#ff7ac3);border-radius:5px 5px 0 0;box-shadow:0 6px 18px rgba(255,120,170,0.12);animation:floatUp linear infinite}
.heart:before,.heart:after{content:"";position:absolute;background:inherit;border-radius:50%}
.heart:before{width:12px;height:12px;left:6px;top:-6px}
.heart:after{width:12px;height:12px;left:-6px;top:6px;transform:rotate(90deg)}
@keyframes floatUp{0%{transform:translateY(0) rotate(-45deg);opacity:0.9}100%{transform:translateY(-120vh) rotate(-45deg);opacity:0}}
.dots{display:inline-block;margin-left:8px}
.dot{display:inline-block;width:6px;height:6px;background:#ffd8e9;border-radius:50%;opacity:0.18;margin-right:3px;animation:blink 1s infinite}
.dot:nth-child(2){animation-delay:0.15s}
.dot:nth-child(3){animation-delay:0.3s}
@keyframes blink{0%{opacity:0.12}50%{opacity:1}100%{opacity:0.12}}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;background:rgba(0,0,0,0.45);padding:10px 14px;border-radius:10px;color:var(--text);z-index:9;backdrop-filter:blur(4px)}
</style>
</head>
<body>
<div id="particles"></div>
<div class="container">
  <div class="header"><div class="avatar">N</div><div><h1 class="title">推しと会話（本物AI対応）</h1><div class="small">本物AI接続はサーバ必須。デプロイ後、[Use Real AI] をONにしてね。</div></div></div>

  <div class="stage">
    <div id="chat" aria-live="polite" role="log"><div class="msg ai">「ここに来てくれてありがとう。もしよければ今日のことを聞かせて。」</div></div>

    <div class="panel">
      <div class="controls">
        <div class="small">心拍数: <span id="bpm">72</span> bpm</div>
        <div class="small">好感度: <span id="aff">12</span></div>

        <div class="inputRow">
          <input id="text" placeholder="話しかけてみて… (例: 今日疲れた)"/>
          <button id="sendBtn">送信</button>
        </div>

        <div style="display:flex;gap:8px;margin-top:10px">
          <button id="togglePro">自発: ON</button>
          <button id="notifBtn">通知許可</button>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button id="useRealBtn">Use Real AI: OFF</button>
          <button id="calm">落ち着く</button>
        </div>

        <div class="small" style="margin-top:10px">BGM: 同フォルダに <strong>bgm.mp3</strong> を置くか audio の URL を差し替えてね。</div>
        <audio id="bgm" controls loop style="margin-top:8px"><source src="bgm.mp3" type="audio/mpeg"></audio>
      </div>
    </div>
  </div>
</div>

<div id="toast" style="display:none" class="toast"></div>
